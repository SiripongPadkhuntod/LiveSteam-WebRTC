services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis:6379
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecret_devsecret_devsecret_12345
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://127.0.0.1:7880}
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - livekit

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - CONTROL_API_URL=http://backend:8080
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  redis-data:
